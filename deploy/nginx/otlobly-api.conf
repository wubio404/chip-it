# Nginx reverse proxy for the Otlobly API (Fastify) — installed on the VPS.
#
# Role (spec §13): TLS termination, HTTP→HTTPS redirect, and the WebSocket
# upgrade path that the on-premise agent's persistent wss:// connection needs.
# CORS is intentionally NOT handled here — the app owns CORS (@fastify/cors,
# whitelisting the PWA origin). Do not add CORS headers in Nginx.
#
# Install: copy to /etc/nginx/sites-available/otlobly-api.conf, symlink into
# sites-enabled, then `nginx -t && systemctl reload nginx`.

# The API listens on loopback:3000 (see Dockerfile EXPOSE / PORT). If running in
# Docker with a published port, this still points at the host-mapped port.
upstream otlobly_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── HTTP :80 — redirect everything to HTTPS ──
server {
    listen 80;
    listen [::]:80;
    server_name api.otlobly.org;

    # Allow ACME HTTP-01 challenges through before redirecting (Let's Encrypt).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 — TLS termination + reverse proxy ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.otlobly.org;

    # TLS certificate paths. The actual cert is placed on the VPS at deploy time
    # (Let's Encrypt via certbot, OR a Cloudflare Origin certificate) — this
    # config only points at the expected paths. Adjust to match what's installed.
    ssl_certificate     /etc/letsencrypt/live/api.otlobly.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.otlobly.org/privkey.pem;

    # TLS 1.2+ only (spec §10).
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Allow reasonably large bodies (menu image metadata / order payloads).
    client_max_body_size 10m;

    # ── Real client IP (spec §11) ──
    # The per-IP rate limits in the app (POST /orders, GET /venues/:slug, etc.)
    # are only correct if the TRUE client IP survives the proxy chain. This API
    # sits behind BOTH Cloudflare and this Nginx, so the real client IP arrives
    # from Cloudflare in these forwarded headers. We pass them through here, and
    # Fastify is configured with `trustProxy: true` so it reads the forwarded IP
    # rather than the proxy's loopback address. If you additionally want Nginx to
    # trust Cloudflare's edge IPs and rewrite $remote_addr, layer in the
    # ngx_http_realip_module with Cloudflare's published ranges — optional; the
    # app-level trustProxy already yields the correct client IP for rate limiting.
    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host            $host;

    # ── WebSocket upgrade for the on-premise agent ──
    # Without the Upgrade/Connection headers and a long read timeout, the
    # persistent wss:// agent link (WS /agent/connect) is dropped.
    location /agent/ {
        proxy_pass http://otlobly_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;   # keep the agent connection alive (spec §13)
        proxy_send_timeout 3600s;

        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host            $host;
    }

    # ── Everything else — plain HTTP reverse proxy ──
    location / {
        proxy_pass http://otlobly_api;
        proxy_http_version 1.1;
    }
}
